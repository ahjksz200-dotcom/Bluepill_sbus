name: PlatformIO Build

# Workflow này sẽ chạy mỗi khi bạn push hoặc tạo Pull Request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Run PlatformIO Build
        run: pio run

      # Bước này giúp bạn tải file .bin hoặc .hex về sau khi build xong thành công
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stm32-sbus-firmware
          path: .pio/build/genericSTM32F103C6/*.bin
          
